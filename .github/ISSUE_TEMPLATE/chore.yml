name: "🔧 Chore"
description: "기타 작업"
title: "[Chore] "
labels: ["chore"]

body:
  - type: textarea
    id: description
    attributes:
      label: "📄 작업 설명"
      description: "어떤 작업인지 작성해 주세요."
      placeholder: "설정 변경, 문서 수정, 패키지 업데이트 등 작업 내용을 적어 주세요."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: "🎯 작업 목적"
      description: "이 작업이 왜 필요한지 작성해 주세요."
      placeholder: "작업 목적이나 배경을 적어 주세요."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업할 내용"
      description: "할 일을 체크박스 형태로 작성해 주세요."
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "🙋🏻 참고 자료"
      description: "참고 자료가 있다면 작성해 주세요."
      placeholder: "관련 문서, 링크, 스크린샷 등을 적어 주세요."