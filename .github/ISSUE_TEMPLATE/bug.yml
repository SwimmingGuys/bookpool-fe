name: "🚨 Bug"
description: "버그 수정"
title: "[Bug] "
labels: ["bug"]

body:
  - type: textarea
    id: bug_description
    attributes:
      label: "📄 버그 설명"
      description: "발생한 버그에 대해 작성해 주세요."
      placeholder: "어떤 문제가 발생했는지 구체적으로 적어 주세요."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ 기대 동작"
      description: "원래 기대했던 동작을 작성해 주세요."
      placeholder: "정상 동작 시 어떻게 동작해야 하는지 적어 주세요."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "🔁 재현 방법"
      description: "버그를 재현하는 방법을 순서대로 작성해 주세요."
      placeholder: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "🙋🏻 참고 자료"
      description: "에러 로그, 스크린샷, 관련 링크 등이 있다면 작성해 주세요."
      placeholder: "에러 메시지, 로그, 스크린샷 등을 적어 주세요."