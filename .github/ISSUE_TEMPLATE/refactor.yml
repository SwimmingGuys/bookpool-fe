name: "♻️ Refactor"
description: "리팩토링"
title: "[Refactor] "
labels: ["refactor"]

body:
  - type: textarea
    id: reason
    attributes:
      label: "📄 리팩토링 이유"
      description: "리팩토링이 필요한 이유를 작성해 주세요."
      placeholder: "현재 구조의 문제점이나 개선이 필요한 이유를 적어 주세요."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "🛠️ 변경 범위"
      description: "어떤 부분을 어떻게 개선할지 작성해 주세요."
      placeholder: "대상 모듈, 클래스, 함수, 구조 등을 적어 주세요."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업할 내용"
      description: "할 일을 체크박스 형태로 작성해 주세요."
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "🙋🏻 참고 자료"
      description: "참고 자료가 있다면 작성해 주세요."
      placeholder: "관련 문서, 코드 위치, 링크 등을 적어 주세요."